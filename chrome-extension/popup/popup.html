<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <span class="popup-title">OPC UA Browser</span>
  </div>
  <div class="popup-body">
    <div class="popup-row">
      <span class="popup-label">API Status</span>
      <span id="popup-status" class="popup-badge popup-badge-unknown">Checking...</span>
    </div>
    <div class="popup-row">
      <span class="popup-label">Server URL</span>
      <span id="popup-server" class="popup-value">-</span>
    </div>
    <div class="popup-row">
      <span class="popup-label">API Base</span>
      <span id="popup-api" class="popup-value">-</span>
    </div>
    <div class="popup-actions">
      <a id="popup-portal-link" href="#" class="popup-link">Open Portal</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
